services:
  - type: web
    name: inventory-backend
    runtime: node
    repo: https://github.com/abhishek21lift-oss/inventory-backend
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://your-frontend-url.vercel.app
      - key: ADMIN_EMAIL
        value: admin@inventory.com
      - key: ADMIN_PASSWORD
        generateValue: true
